name: ci

on:
    push:
        branches: [main]
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        env:
            # Tests run against the stub path so a paid provider is never called.
            PARANOID_QA_PROVIDER: stub
            PARANOID_QA_EMBED_PROVIDER: stub
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v5
            - run: uv sync --frozen --extra serve --extra dev
            - run: uv run ruff check .
            - run: uv run pyright
            - run: uv run pytest
